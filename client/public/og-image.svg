<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0B0F1A"/>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F1A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0B0F1A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C9A74D" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Globe Icon -->
  <circle cx="600" cy="315" r="120" fill="#0B0F1A" stroke="#C9A74D" stroke-width="4"/>
  <ellipse cx="600" cy="315" rx="50" ry="120" stroke="#C9A74D" stroke-width="3" fill="none"/>
  <line x1="480" y1="315" x2="720" y2="315" stroke="#C9A74D" stroke-width="3"/>
  <circle cx="600" cy="315" r="20" fill="#C9A74D"/>
  
  <!-- Brand Text -->
  <text x="600" y="500" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="72" font-weight="bold" letter-spacing="8">LUXESPACE</text>
  <text x="600" y="550" text-anchor="middle" fill="#C9A74D" font-family="Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="12">ELITE PROPERTY NETWORK</text>
  
  <!-- Decorative Elements -->
  <rect x="100" y="100" width="60" height="4" fill="#C9A74D"/>
  <rect x="1040" y="526" width="60" height="4" fill="#C9A74D"/>
</svg>